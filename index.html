<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radiologi Apps</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background-color: #f4f7f6; }
        form { background: white; padding: 20px; border-radius: 8px; max-width: 500px; margin: auto; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        label { display: block; margin-top: 10px; font-weight: bold; }
        input, select, textarea { width: 100%; padding: 8px; margin-top: 5px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        button { margin-top: 20px; width: 100%; padding: 10px; background-color: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        button:hover { background-color: #218838; }
        h2 { text-align: center; color: #333; }
    </style>
</head>
<body>

    <h2>🏥 Form Pendaftaran Pemeriksaan Radiologi<br><small>Klinik Mulia</small></h2>

  <form id="radiologiForm" action="https://script.google.com/macros/s/AKfycbzq8PjuVEJttFFOe6kqIeCAav5Ap_iumnmNPLxPK8JT4s1q1kS_ESwpI1AvPNR4JFu5BA/exec" method="POST">
      
      <label>Nomor ID</label>
      <input type="text" name="nomorID" placeholder="Masukkan Nomor Rekam Medis" required>

      <label>Nama Pasien</label>
      <input type="text" name="namaPasien" placeholder="Masukkan Nama Pasien" required>

      <label>Tanggal Lahir</label>
      <input type="date" name="tanggalLahir" required>

      <label>Jenis Kelamin</label>
      <select name="jenisKelamin" required>
        <option value="">Pilih</option>
        <option value="Laki-laki">Laki-laki</option>
        <option value="Perempuan">Perempuan</option>
      </select>

      <label>Nomor WhatsApp</label>
      <input type="tel" name="whatsapp" placeholder="628xxxxxxxxxx" required>

      <label>Dokter Pengirim</label>
      <input type="text" name="dokter" placeholder="Nama Dokter">

      <label>Jenis Pemeriksaan</label>
      <select name="jenisPemeriksaan" required>
        <option value="">Pilih Pemeriksaan</option>
        <option value="Rontgen">Rontgen</option>
        <option value="USG">USG</option>
      </select>

      <label>Keterangan Klinis</label>
      <textarea name="keterangan" placeholder="Masukkan indikasi klinis"></textarea>

      <button type="submit">Simpan Data Pasien</button>
    </form>

</body>
</html>
