<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Test Form</title>
</head>
<body>
    <h2>Test Form Radiologi</h2>
    
    <form id="myForm">
        <input type="text" name="nomorID" placeholder="Nomor ID" required><br>
        <input type="text" name="namaPasien" placeholder="Nama Pasien" required><br>
        <input type="text" name="dokter" placeholder="Dokter" required><br>
        <input type="text" name="jenisPemeriksaan" placeholder="Jenis Pemeriksaan" required><br>
        <button type="submit">Submit</button>
    </form>
    
    <div id="result"></div>
    
    <script>
        const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycby48eN2ThN00myvJXXLDFPZ91PzX4nTTOEOqaFOWyKUWQ9uMPC0jTeU74QyuU3DaW7H/exec; // GANTI!
        
        document.getElementById('myForm').onsubmit = async function(e) {
            e.preventDefault();
            
            const formData = new URLSearchParams();
            formData.append('nomorID', document.querySelector('[name="nomorID"]').value);
            formData.append('namaPasien', document.querySelector('[name="namaPasien"]').value);
            formData.append('dokter', document.querySelector('[name="dokter"]').value);
            formData.append('jenisPemeriksaan', document.querySelector('[name="jenisPemeriksaan"]').value);
            
            try {
                const response = await fetch(APPS_SCRIPT_URL, {
                    method: 'POST',
                    body: formData.toString(),
                    headers: {'Content-Type': 'application/x-www-form-urlencoded'}
                });
                const text = await response.text();
                document.getElementById('result').innerHTML = '<pre>' + text + '</pre>';
            } catch(e) {
                document.getElementById('result').innerHTML = 'Error: ' + e.message;
            }
        };
    </script>
</body>
</html>
